          { day: 3, title: "乞力马扎罗日照金山", desc: "清晨观景台摄影，全天游猎，社区访问" },
          { day: 4, title: "鸟类与羚羊", desc: "Observation Hill 徒步，湿地生态讲解，日落游猎" },
          { day: 5, title: "返回内罗毕", desc: "告别安博塞利，送往机场或城市酒店" }

        excluded: ["机票", "签证费", "小费", "保险", "个人消费"],
        photography: { times: "清晨 5:30-7:30 (乞力马扎罗晨雾)", lenses: "推荐 200-600mm 拍鸟, 70-200mm 拍象", vehicle: "低底盘车辆，湿地通行优化", power: "营地 220V 插座 + 车内逆变器" },

        subtitle: "Uzoefu wa Utamaduni wa Samburu",

    const pkg = packages[pkgId] || packages['masai-mara'];

    // Inject content
    document.getElementById('packageContent').innerHTML = `

          <p class="hero-subtitle">${pkg.subtitle}</p>
          <div class="trust-bar" style="margin-bottom: 0;">
            <span> ${pkg.days}天</span>
            <span>👥 最多${pkg.guests}人</span>
            <span>⭐ ${pkg.rating}</span>
          </div>
        </div>
      </section>

          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            ${pkg.itinerary.map(day => `
              <details style="background: white; padding: 1rem; border-radius: 6px; box-shadow: var(--shadow-sm);">
                <summary style="font-weight: 600; cursor: pointer;">第${day.day}天：${day.title}</summary>
                <p style="margin-top: 0.5rem; color: #555;">${day.desc}</p>
              </details>
            `).join('')}
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem;">
            <div style="background: white; padding: 1.5rem; border-radius: 6px;">
              <h3 style="margin: 0 0 0.5rem; color: var(--color-success);">✅ 包含</h3>
              <ul style="padding-left: 1.2rem; line-height: 1.8;">${pkg.included.map(i => `<li>${i}</li>`).join('')}</ul>
            </div>
            <div style="background: white; padding: 1.5rem; border-radius: 6px;">
              <h3 style="margin: 0 0 0.5rem; color: var(--color-error);">❌ 不包含</h3>
              <ul style="padding-left: 1.2rem; line-height: 1.8;">${pkg.excluded.map(i => `<li>${i}</li>`).join('')}</ul>
            </div>
          </div>

          <!-- China-Specific Info -->
          <div style="margin-top: 2rem; background: white; padding: 1.5rem; border-radius: 6px;">
            <h3 style="margin: 0 0 0.5rem; color: var(--color-primary);">📸 摄影指南</h3>
            <p><strong>最佳时间：</strong>${pkg.photography.times}</p>
            <p><strong>推荐镜头：</strong>${pkg.photography.lenses}</p>
            <p><strong>车辆配置：</strong>${pkg.photography.vehicle}</p>
            <p><strong>充电设施：</strong>${pkg.photography.power}</p>
          </div>

          <div style="margin-top: 1.5rem; background: white; padding: 1.5rem; border-radius: 6px;">
            <h3 style="margin: 0 0 0.5rem; color: var(--color-primary);">🍽️ 餐饮安排</h3>
            <p>${pkg.dietary}</p>
          </div>

          <div style="margin-top: 1.5rem; background: white; padding: 1.5rem; border-radius: 6px;">
            <h3 style="margin: 0 0 0.5rem; color: var(--color-primary);">🛂 签证协助</h3>
            <p>${pkg.visa}</p>
          </div>

          <!-- Guide -->
          <div style="margin-top: 2rem; background: var(--color-neutral-light); padding: 1.5rem; border-radius: 6px; display: flex; gap: 1rem; flex-wrap: wrap;">
            <img src="/images/placeholder-package.webp" alt="${pkg.guide.name}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;" />
            <div>
              <h3 style="margin: 0;">${pkg.guide.name}</h3>
              <p style="margin: 0.25rem 0; color: #666;">${pkg.guide.community} · ${pkg.guide.years}年经验 · ${pkg.guide.specialty}</p>
              <p style="font-style: italic; margin: 0.5rem 0; color: #444;">“${pkg.guide.quote}”</p>
              <span class="ujamaa-badge">🏆 乌贾马认证合伙人</span>
            </div>
          </div>
        </div>

        <div style="position: sticky; top: 100px; height: fit-content;">

            <div class="package-price" data-price-usd="${pkg.priceUSD}" style="margin: 1rem 0;">
              <span class="price-cny">¥${(pkg.priceUSD * 7.19).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",")} <small>/人</small></span>
              <span class="price-usd">$${pkg.priceUSD.toLocaleString()} <small>/person</small></span>
              <small class="rate-note">汇率每小时更新</small>
            </div>
            <div class="ujamaa-badge" style="margin: 0.5rem 0; justify-content: center;">💚 5% 收益支持社区基金</div>
            <a href="/contact.html?package=${pkgId}" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">立即预订</a>
            <button class="btn btn-outline" style="width: 100%; margin-top: 0.5rem;" onclick="document.getElementById('wechatBtn').click()">微信咨询</button>
          </div>
        </div>
      </div>
    `;

    // Re-run currency converter after DOM injection
    document.addEventListener('DOMContentLoaded', () => {
      if (window.currency) window.currency.updatePrices();
    });
  </script>
</body>
</html>
